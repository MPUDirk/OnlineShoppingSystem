{% extends "base.html" %}

{% block title %}Sign Up - Online Store{% endblock %}

{% block content %}
    <div id="register">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2 class="text-center mb-3">Sign Up</h2>
            <div id="registerMessage" class="container">
                <ul id="messages">
                    {% for v in errors.values %}
                        <li style="color: red">{% for err in v %}{{ err.messages.0 }}{% endfor %}</li>
                    {% endfor %}
                </ul>
            </div>
            <form id="signup" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="regFirstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="regFirstName" name="first_name" value="{{ form.first_name.value|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label for="regLastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="regLastName" name="last_name" value="{{ form.last_name.value|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label for="regUsername" class="form-label">Username</label>
                    <input type="text" class="form-control" id="regUsername" name="username" value="{{ form.username.value|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label for="regEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="regEmail" name="email" value="{{ form.email.value|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label for="regPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="regPassword" name="password" value="{{ form.password.value|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label for="regConfirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="regConfirmPassword" name="confirm_password" value="{{ form.password.value|default:'' }}" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>
            <div class="text-center mt-3">
                <p>Already have an account? <a href="{% url 'user:login' %}">Login</a></p>
            </div>
        </div>
    </div>

    <script src="{% static 'js/signup.js' %}"></script>
{% endblock %}
