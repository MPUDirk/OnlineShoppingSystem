{% extends 'base.html' %}

{% block title %}商品列表 - 在线商城{% endblock %}

{% block content %}
<div class="card">
    <h2>商品搜索</h2>
    <form method="get" class="search-bar">
        <input type="text" class="search-input" name="q" placeholder="搜索商品名称..." value="{{ query|default:'' }}" />
        <button type="submit" class="btn btn-primary">搜索</button>
    </form>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h2>商品列表</h2>
        <div>
            <span id="product-count">正在加载...</span>
        </div>
    </div>

    <div id="product-grid" class="product-grid">
    </div>

    <div id="loading-message" class="text-center" style="padding: 2rem;">
        <p style="color: #666; font-size: 1.1rem;">正在加载商品数据...</p>
    </div>

    <div id="no-products-message" class="text-center" style="padding: 2rem; display: none;">
        <p style="color: #666; font-size: 1.1rem;">暂无商品</p>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {        
        const productGrid = document.getElementById('product-grid');
        const productCount = document.getElementById('product-count');
        const loadingMessage = document.getElementById('loading-message');
        const noProductsMessage = document.getElementById('no-products-message');
        const urlParams = new URLSearchParams(window.location.search);
        const searchQuery = urlParams.get('q') || '';
        const category = urlParams.get('category') || '';
        
        // '/api/products'占位
        axios.get('/api/products', {
            params: {
                q: searchQuery,
                category: category
            }
        })
        .then(function(response) {
            loadingMessage.style.display = 'none';           
            const products = response.data; 
            
            if (products && products.length > 0) {
                // Filter only active products
                const activeProducts = products.filter(p => p.status === 'active');
                
                productCount.textContent = `共 ${activeProducts.length} 件商品`;
                
               
                productGrid.innerHTML = '';
                
                if (activeProducts.length === 0) {
                    productCount.textContent = '共 0 件商品';
                    noProductsMessage.style.display = 'block';
                    return;
                }

                activeProducts.forEach(function(product) {
                    const imageUrl = product.image_url;
                    const name = product.name;
                    const price = product.price;
                    const id = product.id;                   
                    
                    var card = document.createElement('div');
                    card.className = 'product-card';

                    //图片
                    var img = document.createElement('img');
                    img.className = 'product-image';
                    img.src = imageUrl;
                    img.alt = name;
                    card.appendChild(img);

                    
                    var info = document.createElement('div');
                    info.className = 'product-info';

                    // 标题
                    var title = document.createElement('h3');
                    title.className = 'product-title';
                    title.textContent = name;
                    info.appendChild(title);

                    // 价格
                    var priceR = document.createElement('p');
                    priceR.className = 'product-price';
                    priceR.textContent = '¥' + price;
                    info.appendChild(priceR);

                    // 简介
                    var desc = document.createElement('p');
                    desc.className = 'product-desc';
                    desc.style.color = '#666';
                    desc.style.fontSize = '0.9rem';
                    desc.style.margin = '0.5rem 0';
                    desc.textContent = product.description;
                    info.appendChild(desc);

                    
                    var btnDiv = document.createElement('div');
                    btnDiv.style.marginTop = '1rem';

                    // 按钮
                    var link = document.createElement('a');
                    link.href = '/products/' + id + '/';
                    link.className = 'btn btn-primary';
                    link.style.width = '100%';
                    link.textContent = '查看详情';
                    btnDiv.appendChild(link);

                    info.appendChild(btnDiv);
                    card.appendChild(info);

                   
                    productGrid.appendChild(card);
                });
                
            } else {
                productCount.textContent = '共 0 件商品';
                noProductsMessage.style.display = 'block';
            }
        })
        .catch(function(error) {
            console.error('Error fetching products:', error);
            loadingMessage.innerHTML = '<p class="text-danger">加载失败，请稍后重试</p>';
        });
    });
</script>
{% endblock %}
