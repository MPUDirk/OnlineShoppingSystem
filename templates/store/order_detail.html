{% extends 'base.html' %}

{% block title %}订单详情 - 在线商城{% endblock %}

{% block content %}
<div class="card">
    <div class="page-header">
        <div>
            <h1 id="order-detail-title" class="page-title">订单详情</h1>
            <p class="page-subtitle">查看订单状态与商品明细。</p>
        </div>
        <div class="actions">
            <a class="btn btn-secondary" href="/orders/">返回列表</a>
            <button id="btn-request-refund" class="btn btn-warning" type="button" style="display: none;" onclick="requestRefund()">申请退款</button>
            <button id="btn-cancel-order" class="btn btn-danger" type="button" style="display: none;" onclick="cancelOrder()">取消订单</button>
        </div>
    </div>

    <div id="loading-message" class="text-center" style="padding: 2rem;">
        <p style="color: #666; font-size: 1.1rem;">正在加载订单详情...</p>
    </div>

    <div id="order-detail-content" style="display: none;">
        <div class="grid grid-2" style="margin-top: 1rem;">
            <div class="card" aria-label="订单基础信息">
                <h2>订单基础信息</h2>
                <input type="hidden" id="order-id-hidden">
                <ul style="padding-left: 1.2rem; margin-top: 0.6rem;" id="order-basic-info">
                    <li>订单号：<span id="order-number">-</span></li>
                    <li>下单日期：<span id="order-date">-</span></li>
                    <li>总金额：<span id="order-total" style="color: #e74c3c; font-weight: bold;">-</span></li>
                    <li>订单状态：<span class="status" id="order-status">-</span></li>
                    <li>物流单号：<span id="order-logistics">-</span></li>
                </ul>
                
                <div id="order-timeline" style="margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1rem;">
                    <h3>订单进度</h3>
                    <ul style="padding-left: 1.2rem; margin-top: 0.6rem; color: #666; font-size: 0.9rem;" id="timeline-list">
                        <!-- Timeline items -->
                    </ul>
                </div>
            </div>
            
            <div class="card" aria-label="配送信息">
                <h2>配送信息</h2>
                <ul style="padding-left: 1.2rem; margin-top: 0.6rem;">
                     <li>收货人：<span id="order-customer">-</span></li>
                     <li>地址：<span id="order-address">-</span></li>
                </ul>
            </div>
        </div>
        
        <div class="card" style="margin-top: 1rem;" aria-label="商品明细">
            <h2>商品明细</h2>
            <div class="table-wrap" style="margin-top: 0.75rem;">
                <table class="table" aria-label="订单商品明细表格">
                    <thead>
                        <tr>
                            <th scope="col">商品名称</th>
                            <th scope="col">数量</th>
                            <th scope="col">单价</th>
                            <th scope="col">小计</th>
                        </tr>
                    </thead>
                    <tbody id="order-items-body">
                         <!-- Items populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="error-message" class="text-center" style="padding: 2rem; display: none;">
        <p class="text-danger">无法加载订单详情</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Extract Order ID from URL
        const pathParts = window.location.pathname.split('/');
        const segments = pathParts.filter(part => part.length > 0);
        let orderId = null;
        if (segments.length >= 2 && segments[segments.length - 1] !== 'orders') {
            orderId = segments[segments.length - 1];
        }

        if (orderId) {
            loadOrderDetail(orderId);
        } else {
            showError('无效的订单ID');
        }
    });

    function loadOrderDetail(id) {
        const loading = document.getElementById('loading-message');
        const content = document.getElementById('order-detail-content');
        const error = document.getElementById('error-message');
        
        axios.get(`/api/orders/${id}/`)
            .then(res => {
                const data = res.data;
                
                loading.style.display = 'none';
                content.style.display = 'block';

                // Basic Info
                document.getElementById('order-id-hidden').value = data.id;
                document.getElementById('order-number').textContent = data.order_number || data.id;
                document.getElementById('order-date').textContent = data.created_at ? new Date(data.created_at).toLocaleString() : '-';
                document.getElementById('order-total').textContent = `¥ ${data.total_amount || 0}`;
                document.getElementById('order-logistics').textContent = data.logistics_no || '暂无';
                
                // Customer Info
                document.getElementById('order-customer').textContent = data.customer_name || '我'; // Or from user context
                document.getElementById('order-address').textContent = data.shipping_address || '未提供';

                // Status
                const statusSpan = document.getElementById('order-status');
                statusSpan.textContent = data.status_display || data.status;
                statusSpan.className = `status status-${getStatusClass(data.status)}`;
                
                // Timeline
                const timelineUl = document.getElementById('timeline-list');
                const timelineItems = [];
                
                if (data.created_at) timelineItems.push(`<li><strong>下单时间：</strong>${new Date(data.created_at).toLocaleString()}</li>`);
                if (data.ticket_issued_at) timelineItems.push(`<li><strong>出票时间：</strong>${new Date(data.ticket_issued_at).toLocaleString()}</li>`);
                if (data.shipped_at) timelineItems.push(`<li><strong>发货时间：</strong>${new Date(data.shipped_at).toLocaleString()}</li>`);
                if (data.refunded_at) timelineItems.push(`<li><strong>退款时间：</strong>${new Date(data.refunded_at).toLocaleString()}</li>`);
                if (data.cancelled_at) timelineItems.push(`<li><strong>取消时间：</strong>${new Date(data.cancelled_at).toLocaleString()}</li>`);
                
                if (timelineItems.length > 0) {
                    timelineUl.innerHTML = timelineItems.join('');
                } else {
                    timelineUl.innerHTML = '<li>暂无进度信息</li>';
                }
                
                // Show cancel button if pending
                if (data.status === 'pending') {
                    document.getElementById('btn-cancel-order').style.display = 'inline-block';
                } else {
                    document.getElementById('btn-cancel-order').style.display = 'none';
                }
                
                // Show refund button if pending or ticket_issued (but NOT shipped)
                const canRefund = ['pending', 'ticket_issued'].includes(data.status);
                if (canRefund) {
                     document.getElementById('btn-request-refund').style.display = 'inline-block';
                } else {
                     document.getElementById('btn-request-refund').style.display = 'none';
                }

                // Items
                const tbody = document.getElementById('order-items-body');
                if (data.items && data.items.length > 0) {
                    tbody.innerHTML = data.items.map(item => `
                        <tr>
                            <td>
                                <div style="display: flex; align-items: center;">
                                    <img src="${item.product.image_url || 'https://via.placeholder.com/40?text=No+Image'}" alt="${item.product_name || item.product?.name}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px; margin-right: 0.5rem;">
                                    <div>
                                        <a href="/products/${item.product_id}/" style="text-decoration:none; color:#2c3e50;">${item.product_name || item.product?.name || '商品'}</a>
                                        ${item.status ? `<br><span class="status status-${getStatusClass(item.status)}" style="font-size: 0.8rem; padding: 0.1rem 0.4rem;">${getStatusText(item.status)}</span>` : ''}
                                    </div>
                                </div>
                            </td>
                            <td>${item.quantity}</td>
                            <td>¥${item.unit_price || item.price}</td>
                            <td>¥${item.subtotal || (item.quantity * (item.unit_price || item.price)).toFixed(2)}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="muted text-center">暂无商品明细</td></tr>';
                }
            })
            .catch(err => {
                console.error('Failed to load order detail:', err);
                showError();
            });
    }

    function requestRefund() {
        if (!confirm('确定要申请退款吗？')) return;
        
        const orderId = document.getElementById('order-id-hidden').value;

        axios.post(`/api/orders/${orderId}/refund/`, {})
        .then(() => {
            alert('退款申请已提交');
            location.reload();
        })
        .catch(err => {
            alert('操作失败: ' + (err.response?.data?.message || err.message));
        });
    }

    function cancelOrder() {
        if (!confirm('确定要取消此订单吗？取消后无法恢复。')) return;
        
        const orderId = document.getElementById('order-id-hidden').value;

        axios.post(`/api/orders/${orderId}/cancel/`, {})
        .then(() => {
            alert('订单已取消');
            location.reload();
        })
        .catch(err => {
            alert('操作失败: ' + (err.response?.data?.message || err.message));
        });
    }

    function showError(msg) {
        document.getElementById('loading-message').style.display = 'none';
        document.getElementById('order-detail-content').style.display = 'none';
        const errorDiv = document.getElementById('error-message');
        errorDiv.style.display = 'block';
        if (msg) errorDiv.querySelector('p').textContent = msg;
    }

    function getStatusClass(status) {
        switch(status) {
            case 'pending': return 'warn';
            case 'shipped': return 'info';
            case 'ticket_issued': return 'success';
            case 'delivered': return 'success';
            case 'cancelled': return 'danger';
            case 'refunded': return 'secondary';
            default: return 'secondary';
        }
    }

    function getStatusText(status) {
        const map = {
            'pending': '待处理',
            'shipped': '已发货',
            'ticket_issued': '已出票',
            'delivered': '已送达',
            'cancelled': '已取消',
            'refunded': '已退款'
        };
        return map[status] || status;
    }
</script>
{% endblock %}
