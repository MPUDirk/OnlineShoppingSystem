<div class="product-grid">
    {% for product in products %}
        <div class="product-card">
            <img class="product-image" src="{{ product.thumbnail.url }}" alt="{{ product.name }}"/>
            <div class="product-info">
                <h3 class="product-title">{{ product.name }}</h3>
                <p class="product-price">${{ product.price }}</p>
                <p class="product-desc" style="color: #666; font-size: 0.9rem; margin: 0.5rem 0;">
                    {{ product.description|truncatewords:15 }}
                </p>
                <div class="product-actions">
                    <a href="{% url 'shopping:product_detail' product.slug %}" class="btn btn-primary"
                       style="width: 100%;">View Details</a>
                </div>
            </div>
        </div>
    {% empty %}
        <p class="text-center" style="grid-column: 1/-1; color: #666; padding: 2rem;">No products found</p>
    {% endfor %}
</div>
