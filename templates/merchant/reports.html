{% extends 'merchant/base.html' %}

{% block title %}销售报表与分析 - 在线商城{% endblock %}

{% block content %}
<div class="card">
    <div class="page-header">
        <div>
            <h1 id="reports-title" class="page-title">销售报表与分析</h1>
            <p class="page-subtitle">趋势图 + 热销排行 + 明细表格。</p>
        </div>
        <div class="actions">
            <select id="report-period" class="form-control" style="max-width: 200px;" aria-label="时间维度筛选" onchange="fetchReportData()">
                <option value="today">今日</option>
                <option value="week">近 7 天</option>
                <option value="month">近 30 天</option>
                <option value="custom">自定义</option>
            </select>
            <button class="btn btn-secondary" type="button">导出报表</button>
        </div>
    </div>

    <div class="grid grid-2" style="margin-top: 1rem;">
        <div class="card" aria-label="销量趋势">
            <h2>销量趋势（日/周/月）</h2>
            <div id="sales-trend-chart" style="height:350px; width:100%"></div>
            <p class="muted" style="margin-top: 0.5rem;">双击图表可切换显示模式。</p>
        </div>
        <div class="card" aria-label="热销排行">
            <h2>热销商品排行榜</h2>
            <ol style="padding-left: 1.2rem; margin-top: 0.6rem;" id="top-selling-list">
                <li>加载中...</li>
            </ol>
        </div>
    </div>

    <div class="table-wrap" style="margin-top: 1rem;" aria-label="报表明细">
        <table class="table" aria-label="报表明细表格">
            <thead>
                <tr>
                    <th scope="col">日期</th>
                    <th scope="col">订单数</th>
                    <th scope="col">销售额</th>
                    <th scope="col">退款金额</th>
                </tr>
            </thead>
            <tbody id="report-detail-body">
                <tr><td colspan="4" class="muted text-center">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
    const API = {
        reports: {
            sales: '/api/merchant/reports/sales', // 获取销售趋势数据（用于图表）
            topSelling: '/api/merchant/reports/top-selling', // 获取热销商品排行
            details: '/api/merchant/reports/details' // 获取销售报表明细数据
        }
    };

    let salesChartInstance = null;

    document.addEventListener('DOMContentLoaded', () => {
        initChart();
        fetchReportData();
        
        window.addEventListener('resize', () => {
            if (salesChartInstance) {
                salesChartInstance.resize();
            }
        });
    });

    function initChart() {
        const chartDom = document.getElementById('sales-trend-chart');
        salesChartInstance = echarts.init(chartDom);
    }

    function fetchReportData() {
        console.log('Fetching report data...');
        const period = document.getElementById('report-period').value;
        const params = { period };

        // Try to fetch from API, fall back to Mock data if it fails (for demo purposes)
        Promise.all([
            axios.get(API.reports.sales, { params }).catch(() => ({ error: true })),
            axios.get(API.reports.topSelling, { params }).catch(() => ({ error: true })),
            axios.get(API.reports.details, { params }).catch(() => ({ error: true }))
        ]).then(([salesRes, topRes, detailRes]) => {
            
            // 1. Sales Chart Data
            let salesData = salesRes.data;
            if (salesRes.error || !salesData) {
                console.warn('API unavailable, using Mock Data for Chart');
                salesData = generateMockSalesData(period);
            }
            renderSalesChart(salesData);

            // 2. Top Selling Data
            const topList = document.getElementById('top-selling-list');
            let topData = topRes.data;
            if (topRes.error || !topData) {
                topData = [
                    { name: '智能手机 Pro Max', count: 120 },
                    { name: '无线蓝牙耳机', count: 85 },
                    { name: '男士休闲夹克', count: 64 },
                    { name: '舒适棉质T恤', count: 52 },
                    { name: '蒸汽眼罩', count: 48 }
                ];
            }
            
            if (topData && topData.length > 0) {
                topList.innerHTML = topData.map((item, index) => `
                    <li>
                        <span style="display:inline-block; width:20px; color:#999;">${index + 1}.</span>
                        ${item.name} 
                        <span class="pill" style="float:right;">销量 ${item.count}</span>
                    </li>
                `).join('');
            } else {
                topList.innerHTML = '<li>暂无数据</li>';
            }

            // 3. Report Details
            const detailBody = document.getElementById('report-detail-body');
            let detailData = detailRes.data;
            if (detailRes.error || !detailData) {
                detailData = generateMockDetailData(period);
            }

            if (detailData && detailData.length > 0) {
                detailBody.innerHTML = detailData.map(item => `
                    <tr>
                        <td>${item.date}</td>
                        <td>${item.order_count}</td>
                        <td>¥ ${item.sales_amount}</td>
                        <td>¥ ${item.refund_amount}</td>
                    </tr>
                `).join('');
            } else {
                detailBody.innerHTML = '<tr><td colspan="4" class="muted text-center">暂无数据</td></tr>';
            }

        });
    }

    function renderSalesChart(data) {
        if (!salesChartInstance) return;

        // Normalize data format
        // Expected: { dates: [], sales: [], orders: [] } or array of objects
        let dates = [], sales = [], orders = [];
        
        if (Array.isArray(data)) {
            dates = data.map(i => i.date);
            sales = data.map(i => i.sales_amount || i.sales);
            orders = data.map(i => i.order_count || i.orders);
        } else if (data.dates) {
            dates = data.dates;
            sales = data.sales;
            orders = data.orders;
        }

        const option = {
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'cross', label: { backgroundColor: '#6a7985' } }
            },
            legend: { data: ['销售额', '订单数'] },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: [
                { type: 'category', boundaryGap: false, data: dates }
            ],
            yAxis: [
                { 
                    type: 'value', 
                    name: '销售额', 
                    position: 'left',
                    axisLabel: { formatter: '¥ {value}' }
                },
                { 
                    type: 'value', 
                    name: '订单数', 
                    position: 'right', 
                    splitLine: { show: false }, // Avoid grid line overlap
                    axisLabel: { formatter: '{value}' }
                }
            ],
            series: [
                {
                    name: '销售额',
                    type: 'line',
                    smooth: true,
                    yAxisIndex: 0,
                    areaStyle: {
                        opacity: 0.3,
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(52, 152, 219, 1)' },
                            { offset: 1, color: 'rgba(52, 152, 219, 0.1)' }
                        ])
                    },
                    itemStyle: { color: '#3498db' },
                    data: sales
                },
                {
                    name: '订单数',
                    type: 'line',
                    smooth: true,
                    yAxisIndex: 1,
                    itemStyle: { color: '#e74c3c' },
                    lineStyle: { type: 'dashed' },
                    data: orders
                }
            ]
        };

        salesChartInstance.setOption(option);
    }

    // --- Mock Data Generators ---
    function generateMockSalesData(period) {
        const count = period === 'month' ? 30 : (period === 'week' ? 7 : 12); // 12 for today (hours)
        const dates = [];
        const sales = [];
        const orders = [];
        
        for (let i = 0; i < count; i++) {
            if (period === 'today') {
                dates.push(`${i*2}:00`);
            } else {
                const d = new Date();
                d.setDate(d.getDate() - (count - 1 - i));
                dates.push(`${d.getMonth()+1}-${d.getDate()}`);
            }
            
            const baseSales = Math.floor(Math.random() * 1000) + 500;
            sales.push(baseSales);
            orders.push(Math.floor(baseSales / 100) + Math.floor(Math.random() * 5));
        }
        return { dates, sales, orders };
    }

    function generateMockDetailData(period) {
        const { dates, sales, orders } = generateMockSalesData(period);
        // Reverse to show latest first
        const result = [];
        for (let i = dates.length - 1; i >= 0; i--) {
            result.push({
                date: dates[i],
                order_count: orders[i],
                sales_amount: sales[i],
                refund_amount: Math.floor(Math.random() * 50)
            });
        }
        return result.slice(0, 10); // Show top 10
    }
</script>
{% endblock %}
