{% extends 'merchant/base.html' %}

{% block title %}库存管理 - 在线商城{% endblock %}

{% block content %}
<div class="card">
    <div class="page-header">
        <div>
            <h1 id="inventory-title" class="page-title">库存管理</h1>
            <p class="page-subtitle">按 SKU（含可配置商品的每种规格）维护库存状态：有货 / 缺货。接口就绪后表格将自动填充。</p>
        </div>
    </div>

    <div class="table-wrap" style="margin-top: 1rem;" aria-label="库存表格">
        <table class="table" aria-label="库存列表表格">
            <thead>
                <tr>
                    <th scope="col">商品</th>
                    <th scope="col">SKU</th>
                    <th scope="col">规格</th>
                    <th scope="col">库存数量</th>
                    <th scope="col">库存状态</th>
                    <th scope="col">操作</th>
                </tr>
            </thead>
            <tbody id="inventory-list-body">
                 <tr><td colspan="6" class="muted text-center">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const API = {
        inventory: {
            list: '/api/merchant/inventory',
            update: (id) => `/api/merchant/inventory/${id}`
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        fetchInventory();
    });

    function fetchInventory() {
        axios.get(API.inventory.list)
            .then(res => renderInventory(res.data.results || []))
            .catch(err => {
                console.error('Failed to fetch inventory:', err);
                document.getElementById('inventory-list-body').innerHTML =
                    '<tr><td colspan="6" class="text-danger text-center">数据加载失败（需后端接口）</td></tr>';
            });
    }

    function esc(s) {
        if (s == null) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/"/g, '&quot;');
    }

    function renderInventory(items) {
        const tbody = document.getElementById('inventory-list-body');
        if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="muted text-center">暂无数据</td></tr>';
            return;
        }
        tbody.innerHTML = items.map(i => {
            const stock = i.stock !== undefined ? i.stock : 0;
            const stockStatus = (stock > 0) ? 'ok' : 'warn';
            const statusText = (stock > 0) ? '有货' : '缺货';
            const imageUrl = i.image_url || 'https://via.placeholder.com/40';
            const sku = i.sku != null ? i.sku : (i.sku_code || '—');
            const spec = i.configuration_label != null ? i.configuration_label : (i.variant_label || '—');

            return `
            <tr>
                <td>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <img src="${esc(imageUrl)}" alt="" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;">
                        <span>${esc(i.name)}</span>
                    </div>
                </td>
                <td><code style="font-size: 0.85rem;">${esc(sku)}</code></td>
                <td style="max-width: 12rem;">${esc(spec)}</td>
                <td>
                    <input type="number"
                           class="form-control inv-qty-input"
                           style="width: 80px; padding: 4px;"
                           data-inv-id="${esc(i.id)}"
                           value="${stock}"
                           min="0"
                    >
                </td>
                <td><span class="status status-${stockStatus}">${statusText}</span></td>
                <td>
                    <button class="btn btn-secondary btn-sm" type="button" onclick="saveRow('${esc(i.id)}')">保存</button>
                </td>
            </tr>
        `}).join('');
    }

    function saveRow(id) {
        const input = document.querySelector('.inv-qty-input[data-inv-id="' + id + '"]');
        if (input) updateStockQuantity(id, input.value, true);
    }

    function updateStockQuantity(id, newStock, showMessage = false) {
        const stock = parseInt(newStock, 10);
        if (isNaN(stock) || stock < 0) {
            alert('请输入有效的库存数量');
            return;
        }

        axios.patch(API.inventory.update(id), { stock: stock })
            .then(() => {
                if (showMessage) alert('库存更新成功');
                fetchInventory();
            })
            .catch(err => {
                const msg = err.response?.data?.message || err.message;
                alert('库存更新失败: ' + msg);
            });
    }
</script>
{% endblock %}
