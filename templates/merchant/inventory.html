{% extends 'merchant/base.html' %}

{% block title %}库存管理 - 在线商城{% endblock %}

{% block content %}
<div class="card">
    <div class="page-header">
        <div>
            <h1 id="inventory-title" class="page-title">库存管理</h1>
            <p class="page-subtitle">展示库存状态。</p>
        </div>
    </div>

    <div class="table-wrap" style="margin-top: 1rem;" aria-label="库存表格">
        <table class="table" aria-label="库存列表表格">
            <thead>
                <tr>
                    <th scope="col">商品</th>
                    <th scope="col">库存数量</th>
                    <th scope="col">库存状态</th>
                    <th scope="col">操作</th>
                </tr>
            </thead>
            <tbody id="inventory-list-body">
                 <tr><td colspan="4" class="muted text-center">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const API = {
        inventory: {
            list: '/api/merchant/inventory', // 获取商品库存列表
            update: (id) => `/api/merchant/inventory/${id}` // 更新单个商品库存状态
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        fetchInventory();
    });

    function fetchInventory() {
        console.log('Fetching inventory...');
        axios.get(API.inventory.list)
            .then(res => renderInventory(res.data.results || []))
            .catch(err => {
                console.error('Failed to fetch inventory:', err);
                document.getElementById('inventory-list-body').innerHTML = '<tr><td colspan="4" class="text-danger text-center">数据加载失败</td></tr>';
            });
    }

    function renderInventory(items) {
        const tbody = document.getElementById('inventory-list-body');
        if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="muted text-center">暂无数据</td></tr>';
            return;
        }
        tbody.innerHTML = items.map(i => {
            const stock = i.stock !== undefined ? i.stock : 0;
            const stockStatus = (stock > 0) ? 'ok' : 'warn';
            const statusText = (stock > 0) ? '有货' : '缺货';
            
            // 使用占位图如果图片不存在
            const imageUrl = i.image_url || 'https://via.placeholder.com/40';

            return `
            <tr>
                <td>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <img src="${imageUrl}" alt="${i.name}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;">
                        <span>${i.name}</span>
                    </div>
                </td>
                <td>
                    <input type="number" 
                           class="form-control" 
                           style="width: 80px; padding: 4px;" 
                           value="${stock}" 
                           min="0"
                           onchange="updateStockQuantity('${i.id}', this.value)"
                    >
                </td>
                <td><span class="status status-${stockStatus}">${statusText}</span></td>
                <td>
                    <button class="btn btn-secondary btn-sm" type="button" onclick="updateStockQuantity('${i.id}', document.querySelector('input[onchange*=${i.id}]').value, true)">保存</button>
                </td>
            </tr>
        `}).join('');
    }

    function updateStockQuantity(id, newStock, showMessage = false) {
        const stock = parseInt(newStock);
        if (isNaN(stock) || stock < 0) {
            alert('请输入有效的库存数量');
            return;
        }

        axios.patch(API.inventory.update(id), { stock: stock })
            .then(() => {
                if (showMessage) alert('库存更新成功');
                fetchInventory();
            })
            .catch(err => {
                const msg = err.response?.data?.message || err.message;
                alert('库存更新失败: ' + msg);
            });
    }
</script>
{% endblock %}
