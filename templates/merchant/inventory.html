{% extends 'merchant/base.html' %}

{% block title %}库存管理 - 在线商城{% endblock %}

{% block content %}
<div class="card">
    <div class="page-header">
        <div>
            <h1 id="inventory-title" class="page-title">库存管理</h1>
            <p class="page-subtitle">展示库存状态。</p>
        </div>
    </div>

    <div class="table-wrap" style="margin-top: 1rem;" aria-label="库存表格">
        <table class="table" aria-label="库存列表表格">
            <thead>
                <tr>
                    <th scope="col">商品名称</th>
                    <th scope="col">配置信息</th>
                    <th scope="col">库存状态</th>
                    <th scope="col">操作</th>
                </tr>
            </thead>
            <tbody id="inventory-list-body">
                 <tr><td colspan="4" class="muted text-center">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const API = {
        inventory: {
            list: '/api/merchant/inventory', // 获取商品库存列表
            update: (id) => `/api/merchant/inventory/${id}` // 更新单个商品库存状态
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        fetchInventory();
    });

    function fetchInventory() {
        console.log('Fetching inventory...');
        axios.get(API.inventory.list)
            .then(res => renderInventory(res.data.results || []))
            .catch(err => {
                console.error('Failed to fetch inventory:', err);
                document.getElementById('inventory-list-body').innerHTML = '<tr><td colspan="4" class="text-danger text-center">数据加载失败</td></tr>';
            });
    }

    function renderInventory(items) {
        const tbody = document.getElementById('inventory-list-body');
        if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="muted text-center">暂无数据</td></tr>';
            return;
        }
        tbody.innerHTML = items.map(i => `
            <tr>
                <td>${i.name}</td>
                <td>${i.sku}</td>
                <td><span class="status status-${i.status === 'ok' ? 'ok' : 'warn'}">${i.status === 'ok' ? '有货' : '缺货'}</span></td>
                <td><button class="btn btn-secondary" type="button" onclick="updateInventoryStatus('${i.id}', '${i.status}')">修改库存状态</button></td>
            </tr>
        `).join('');
    }

    function updateInventoryStatus(id, currentStatus) {
        const newStatus = currentStatus === 'ok' ? 'warn' : 'ok';
        const statusText = newStatus === 'ok' ? '有货' : '缺货';
        
        if (!confirm(`确认将该商品库存状态修改为“${statusText}”吗？`)) return;

        axios.patch(API.inventory.update(id), { status: newStatus })
            .then(() => {
                alert('操作成功');
                fetchInventory();
            })
            .catch(err => alert('操作失败: ' + (err.response?.data?.message || err.message)));
    }
</script>
{% endblock %}
