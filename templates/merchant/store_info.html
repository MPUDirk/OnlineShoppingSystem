{% extends 'merchant/base.html' %}

{% block title %}店铺信息管理 - 在线商城{% endblock %}

{% block content %}
<div class="card">
    <div class="page-header">
        <div>
            <h1 id="store-title" class="page-title">店铺信息管理</h1>
            <p class="page-subtitle">基础信息与展示设置。</p>
        </div>
        <div class="actions" aria-label="保存操作">
            <button id="btn-save-store" class="btn btn-primary" type="button" aria-label="保存店铺信息">保存</button>
            <span id="store-save-status" class="muted" role="status" aria-live="polite"></span>
        </div>
    </div>

    <div class="grid grid-2" style="margin-top: 1rem;">
        <div class="card" aria-label="基础信息">
            <h2>基础信息</h2>
            <div class="form-group">
                <label class="form-label" for="store-name">店铺名称</label>
                <input id="store-name" class="form-control" type="text" placeholder="请输入店铺名称" aria-label="店铺名称输入框">
            </div>
            <div class="form-group">
                <label class="form-label" for="store-intro">店铺简介</label>
                <textarea id="store-intro" class="form-control" rows="4" placeholder="请输入店铺简介" aria-label="店铺简介输入框"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label" for="store-status">店铺状态</label>
                <select id="store-status" class="form-control" aria-label="店铺状态选择">
                    <option value="active">启用</option>
                    <option value="paused">暂停</option>
                </select>
                <p class="muted" style="margin-top: 0.5rem;">暂停后店铺在顾客端隐藏。</p>
            </div>
        </div>

        <div class="card" aria-label="展示设置">
            <h2>店铺展示设置</h2>
            <div class="form-group">
                <label class="form-label" for="store-logo">店铺 LOGO</label>
                <div class="inline" style="align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                     <img id="preview-logo" src="" alt="Logo Preview" style="width: 64px; height: 64px; object-fit: cover; border-radius: 50%; display: none; border: 1px solid #eee;">
                     <input type="hidden" id="logo-url">
                </div>
                <input id="store-logo" class="form-control" type="file" accept="image/png,image/jpeg" aria-label="店铺LOGO上传" onchange="uploadStoreImage(this, 'logo')">
                <p class="muted" style="margin-top: 0.5rem;">支持 PNG/JPG</p>
            </div>
            <div class="form-group">
                <label class="form-label" for="store-cover">店铺封面图</label>
                <div class="inline" style="align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                     <img id="preview-cover" src="" alt="Cover Preview" style="width: 160px; height: 90px; object-fit: cover; border-radius: 4px; display: none; border: 1px solid #eee;">
                     <input type="hidden" id="cover-url">
                </div>
                <input id="store-cover" class="form-control" type="file" accept="image/png,image/jpeg" aria-label="店铺封面图上传" onchange="uploadStoreImage(this, 'cover')">
                <p class="muted" style="margin-top: 0.5rem;">建议比例 16:9。</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const API = {
        store: {
            info: '/api/merchant/store', // 获取当前店铺信息
            save: '/api/merchant/store' // 保存/更新店铺信息
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        loadStoreInfo();
        const saveStoreBtn = document.getElementById('btn-save-store');
        if (saveStoreBtn) saveStoreBtn.addEventListener('click', saveStoreInfo);
    });

    function loadStoreInfo() {
        console.log('Loading store info...');
        axios.get(API.store.info)
            .then(res => {
                const data = res.data;
                document.getElementById('store-name').value = data.name || '';
                document.getElementById('store-intro').value = data.intro || '';
                document.getElementById('store-status').value = data.status || 'active';
                
                if (data.logo) {
                    document.getElementById('logo-url').value = data.logo;
                    const img = document.getElementById('preview-logo');
                    img.src = data.logo;
                    img.style.display = 'block';
                }
                if (data.cover) {
                    document.getElementById('cover-url').value = data.cover;
                    const img = document.getElementById('preview-cover');
                    img.src = data.cover;
                    img.style.display = 'block';
                }
            })
            .catch(err => console.error('Failed to load store info:', err));
    }

    function saveStoreInfo() {
        const data = {
            name: document.getElementById('store-name').value,
            intro: document.getElementById('store-intro').value,
            status: document.getElementById('store-status').value,
            logo: document.getElementById('logo-url').value,
            cover: document.getElementById('cover-url').value
        };
        axios.post(API.store.save, data)
            .then(res => {
                const status = document.getElementById('store-save-status');
                status.textContent = '保存成功！';
                setTimeout(() => status.textContent = '', 3000);
            })
            .catch(err => alert('保存失败：' + (err.response?.data?.message || err.message)));
    }

    function uploadStoreImage(input, type) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            const formData = new FormData();
            formData.append('image', file);
            formData.append('type', type); // Optional: tell backend it's a logo or cover

            axios.post('/api/merchant/upload/image', formData, {
                headers: {
                    'Content-Type': 'multipart/form-data'
                }
            })
            .then(res => {
                const imageUrl = res.data.url;
                if (type === 'logo') {
                    document.getElementById('logo-url').value = imageUrl;
                    const img = document.getElementById('preview-logo');
                    img.src = imageUrl;
                    img.style.display = 'block';
                } else {
                    document.getElementById('cover-url').value = imageUrl;
                    const img = document.getElementById('preview-cover');
                    img.src = imageUrl;
                    img.style.display = 'block';
                }
                alert('图片上传成功');
            })
            .catch(err => {
                console.error('Upload failed', err);
                alert('图片上传失败 (需后端实现 /api/merchant/upload/image 接口)');
            });
        }
    }
</script>
{% endblock %}
