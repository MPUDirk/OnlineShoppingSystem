{% extends 'base.html' %}

{% block title %}购物车 - 在线商城{% endblock %}

{% block content %}
<div class="card">
    <h2>我的购物车</h2>
    <div id="cart-loading" class="text-center" style="padding: 3rem;">
        <p style="color: #666; font-size: 1.1rem;">正在加载购物车...</p>
    </div>

    <div id="cart-content" style="display: none;">
        <!-- 购物车商品将在此处插入 -->
    </div>

    <div id="cart-empty" class="text-center" style="padding: 3rem; display: none;">
        <p style="color: #666; font-size: 1.1rem; margin-bottom: 1rem;">购物车是空的</p>
        <a href="/products/" class="btn btn-primary">去购物</a>
    </div>

    <div id="cart-footer" style="display: none;">
        <div class="cart-total">
            <strong>总计: ¥<span id="cart-total-price">0.00</span></strong>
        </div>

        <div style="text-align: right; margin-top: 1rem;">
            <button onclick="checkout()" class="btn btn-success" style="padding: 1rem 2rem; font-size: 1.1rem;">去结算</button>
        </div>
    </div>
</div>

<!-- 引入 Axios -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        fetchCart();
    });

    function fetchCart() {
        const loading = document.getElementById('cart-loading');
        const content = document.getElementById('cart-content');
        const empty = document.getElementById('cart-empty');
        const footer = document.getElementById('cart-footer');
        const totalPriceEl = document.getElementById('cart-total-price');
//'/api/cart/'占位
        axios.get('/api/cart/')
            .then(function(response) {
                const cart = response.data;
                const items = cart.items || [];

                loading.style.display = 'none';

                if (items.length === 0) {
                    empty.style.display = 'block';
                    content.style.display = 'none';
                    footer.style.display = 'none';
                } else {
                    empty.style.display = 'none';
                    content.style.display = 'block';
                    footer.style.display = 'block';
                    
                    totalPriceEl.textContent = cart.total_price || '0.00';
                    renderCartItems(items);
                }
            })
            .catch(function(error) {
                console.error('Error fetching cart:', error);
                loading.innerHTML = '<p class="text-danger">加载购物车失败，请刷新重试</p>';
            });
    }

    function renderCartItems(items) {
        const container = document.getElementById('cart-content');
        container.innerHTML = '';

        items.forEach(function(item) {
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <div class="cart-item-info">
                    <h4><a href="/products/${item.product.id}/" style="text-decoration: none; color: #2c3e50;">${item.product.name}</a></h4>
                    <p style="color: #666; font-size: 0.9rem;">${(item.product.description || '').substring(0, 50)}</p>
                    <div style="margin-top: 0.5rem;">
                        <label style="margin-right: 0.5rem;">数量:</label>
                        <input type="number" value="${item.quantity}" min="1" 
                               onchange="updateQuantity(${item.id}, this.value)"
                               style="width: 60px; padding: 0.25rem; border: 1px solid #ddd; border-radius: 4px;" />
                        <button onclick="removeItem(${item.id})" class="btn btn-danger" style="margin-left: 1rem; padding: 0.25rem 0.5rem; font-size: 0.9rem;">删除</button>
                    </div>
                </div>
                <div class="cart-item-price">¥${item.product.price}</div>
            `;
            container.appendChild(div);
        });
    }

    function updateQuantity(itemId, newQuantity) {
        if (newQuantity < 1) return;
        
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]') ? document.querySelector('[name=csrfmiddlewaretoken]').value : '';

        axios.post('/api/cart/update/', {
            item_id: itemId,
            quantity: parseInt(newQuantity)
        }, {
            headers: {
                'X-CSRFToken': csrfToken
            }
        })
        .then(function(response) {
            if (response.data.success) {
                fetchCart(); // 重新加载购物车
            } else {
                alert('更新失败: ' + (response.data.message || '未知错误'));
            }
        })
        .catch(function(error) {
            console.error('Update cart error:', error);
            alert('更新失败，请稍后重试');
        });
    }

    function removeItem(itemId) {
        if (!confirm('确定要删除此商品吗？')) return;

        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]') ? document.querySelector('[name=csrfmiddlewaretoken]').value : '';

        axios.post('/api/cart/remove/', {
            item_id: itemId
        }, {
            headers: {
                'X-CSRFToken': csrfToken
            }
        })
        .then(function(response) {
            if (response.data.success) {
                fetchCart(); // 重新加载购物车
            } else {
                alert('删除失败: ' + (response.data.message || '未知错误'));
            }
        })
        .catch(function(error) {
            console.error('Remove item error:', error);
            alert('删除失败，请稍后重试');
        });
    }

    function checkout() {
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]') ? document.querySelector('[name=csrfmiddlewaretoken]').value : '';
        
        axios.post('/api/cart/checkout/', {}, {
             headers: {
                'X-CSRFToken': csrfToken
            }
        })
        .then(function(response) {
            if (response.data.success) {
                alert('结算成功！订单号: ' + response.data.order_number);
                window.location.href = '/orders/';
            } else {
                alert('结算失败: ' + (response.data.message || '未知错误'));
            }
        })
        .catch(function(error) {
             console.error('Checkout error:', error);
             alert('结算请求失败');
        });
    }
</script>
{% endblock %}
