{% extends 'base.html' %}

{% block title %}首页 - 在线商城{% endblock %}

{% block content %}
<div class="card" style="background-image: url('https://m.media-amazon.com/images/I/71ow30oSEgL._SX3000_.jpg'); background-size: cover; background-position: center; height: 400px; display: flex; align-items: center; justify-content: center;">
    <h1 style="color: white; font-size: 3rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">欢迎来到在线商城</h1>
</div>

<div class="card">
    <form method="get" action="/products/" class="search-bar" style="margin-bottom: 0;">
        <input type="text" class="search-input" name="q" placeholder="搜索您想要的商品..." />
        <button type="submit" class="btn btn-primary">搜索</button>
    </form>
</div>

<div class="home-layout">
    <!-- 商品分类 -->
    <aside class="home-sidebar">
        <div class="card" style="height: 100%">
            <h2 class="mb-3">商品分类</h2>
            <div class="category-list">
                <a href="/products/?category=electronics" class="category-item">
                    <h3 style="color: #2c3e50; margin-bottom: 0.5rem; font-size: 1.1rem;">电子产品</h3>
                    <p style="color: #666; font-size: 0.85rem; margin: 0;">查看详情</p>
                </a>
                <a href="/products/?category=clothing" class="category-item">
                    <h3 style="color: #2c3e50; margin-bottom: 0.5rem; font-size: 1.1rem;">服装</h3>
                    <p style="color: #666; font-size: 0.85rem; margin: 0;">查看详情</p>
                </a>
                <a href="/products/?category=books" class="category-item">
                    <h3 style="color: #2c3e50; margin-bottom: 0.5rem; font-size: 1.1rem;">图书</h3>
                    <p style="color: #666; font-size: 0.85rem; margin: 0;">查看详情</p>
                </a>
                <a href="/products/?category=home" class="category-item">
                    <h3 style="color: #2c3e50; margin-bottom: 0.5rem; font-size: 1.1rem;">家居</h3>
                    <p style="color: #666; font-size: 0.85rem; margin: 0;">查看详情</p>
                </a>
            </div>
        </div>
    </aside>


    <div class="home-content">
        <div class="card" style="height: 100%">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>热门商品</h2>
                <a href="/products/" class="btn btn-primary">查看全部</a>
            </div>

            <div id="loading-message" class="text-center" style="padding: 2rem;">
                <p style="color: #666; font-size: 1.1rem;">正在加载热门商品...</p>
            </div>

            <div id="product-grid" class="product-grid">
                
            </div>

            <div id="no-products-message" class="text-center" style="padding: 2rem; display: none;">
                <p style="color: #666; font-size: 1.1rem;">暂无热门商品</p>
            </div>
        </div>
    </div>
</div>

<div class="card" style="margin-top: 1rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h2>新品上市</h2>
    </div>
    <div id="new-arrivals-grid" class="product-grid"></div>
</div>


<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const API_URL = '/api/products/featured'; 
        
        const productGrid = document.getElementById('product-grid');
        const newArrivalsGrid = document.getElementById('new-arrivals-grid');
        const loadingMessage = document.getElementById('loading-message');
        const noProductsMessage = document.getElementById('no-products-message');
        
       
        axios.get(API_URL)
            .then(function(response) {
                loadingMessage.style.display = 'none';
                
                const products = response.data;
                
                if (products && products.length > 0) {
                    productGrid.innerHTML = '';
                    
                    
                    const featured = products.slice(0, 3);
                    
                    featured.forEach(function(product) {
                        productGrid.appendChild(createProductCard(product));
                    });
                    
                    
                    const newArrivals = products.slice(-3).reverse();
                    newArrivalsGrid.innerHTML = '';
                    newArrivals.forEach(function(product) {
                        newArrivalsGrid.appendChild(createProductCard(product));
                    });

                } else {
                    noProductsMessage.style.display = 'block';
                }
            })
            .catch(function(error) {
                console.error('Error fetching featured products:', error);
                loadingMessage.innerHTML = '<p class="text-danger">加载失败，请稍后重试</p>';
            });

        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';

            const img = document.createElement('img');
            img.className = 'product-image';
            img.src = product.image_url || 'https://via.placeholder.com/250x200?text=%E5%95%86%E5%93%81%E5%9B%BE%E7%89%87';
            img.alt = product.name || '商品';
            card.appendChild(img);

            const info = document.createElement('div');
            info.className = 'product-info';

            const title = document.createElement('h3');
            title.className = 'product-title';
            title.textContent = product.name || '未命名商品';
            info.appendChild(title);

            const price = document.createElement('p');
            price.className = 'product-price';
            price.textContent = `¥${product.price || '0.00'}`;
            info.appendChild(price);

            const desc = document.createElement('p');
            desc.style.color = '#666';
            desc.style.fontSize = '0.9rem';
            desc.style.margin = '0.5rem 0';
            
            let descText = product.description || '';
            if (descText.length > 50) {
                descText = descText.substring(0, 50) + '...';
            }
            desc.textContent = descText;
            info.appendChild(desc);

            const btnDiv = document.createElement('div');
            btnDiv.style.marginTop = '1rem';
            btnDiv.className = 'product-actions'; // Use class from demo1

            const link = document.createElement('a');
            link.href = `/products/${product.id}/`;
            link.className = 'btn btn-primary';
            link.style.width = '100%';
            link.textContent = '查看详情';
            btnDiv.appendChild(link);

            info.appendChild(btnDiv);
            card.appendChild(info);
            
            return card;
        }
    });
</script>
